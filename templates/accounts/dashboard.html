<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <div class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
        <h4 class="mb-4">College Admin</h4>

        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a href="{% url 'dashboard' %}" class="nav-link text-white">Dashboard</a>
            </li>
            <li class="nav-item mb-2">
                <a href="{% url 'student_list' %}" class="nav-link text-white">Students</a>
            </li>
            <li class="nav-item mb-2">
                <a href="{% url 'carousel_list' %}" class="nav-link text-white">Carousel</a>
            </li>
            <li class="nav-item mb-2">
                <a href="{% url 'gallery_list' %}" class="nav-link text-white">Gallery</a>
            </li>
            <li class="nav-item mb-2">
                <a href="{% url 'contact_list' %}" class="nav-link text-white">Contacts</a>
            </li>
            <li class="nav-item mt-4">
                <a href="{% url 'admin_logout' %}" class="nav-link text-danger">Logout</a>
            </li>
        </ul>
    </div>

    <div class="p-4 w-100">
        <h2 class="mb-4">Dashboard</h2>

        <div class="row">
            <div class="col-md-3 mb-3">
                <div class="card shadow-sm p-3">
                    <h5>Students</h5>
                    <h2>{{ student_count }}</h2>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm p-3">
                    <h5>Carousel</h5>
                    <h2>{{ carousel_count }}</h2>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm p-3">
                    <h5>Gallery</h5>
                    <h2>{{ gallery_count }}</h2>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm p-3">
                    <h5>Contacts</h5>
                    <h2>{{ contact_count }}</h2>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
