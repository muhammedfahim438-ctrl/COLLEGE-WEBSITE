<!DOCTYPE html>
<html>
<head>
    <title>Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h2>Carousel Images</h2>
        <a href="{% url 'carousel_add' %}" class="btn btn-primary">Add Image</a>
    </div>

    <div class="row">
        {% for item in items %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <img src="{{ item.image.url }}" class="card-img-top" style="height: 220px; object-fit: cover;">
                <div class="card-body">
                    <h5>{{ item.title }}</h5>
                    <a href="{% url 'carousel_delete' item.id %}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p>No images uploaded.</p>
        {% endfor %}
    </div>

    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back</a>
</div>

</body>
</html>
