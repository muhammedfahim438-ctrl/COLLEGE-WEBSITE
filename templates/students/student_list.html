<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Students</h2>
        <a href="{% url 'student_add' %}" class="btn btn-primary">Add Student</a>
    </div>

    <form method="get" class="mb-3">
        <input type="text" name="q" class="form-control" placeholder="Search student..." value="{{ query }}">
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Course</th>
                <th>Joining Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.email }}</td>
                <td>{{ student.phone }}</td>
                <td>{{ student.course }}</td>
                <td>{{ student.date_of_joining }}</td>
                <td>
                    <a href="{% url 'student_edit' student.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'student_delete' student.id %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6" class="text-center">No students found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>

</div>

</body>
</html>
