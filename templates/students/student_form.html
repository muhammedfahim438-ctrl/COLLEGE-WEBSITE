<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width: 650px;">

    <h2 class="mb-4">
        {% if student %}Edit Student{% else %}Add Student{% endif %}
    </h2>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" value="{{ student.name|default:'' }}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" value="{{ student.email|default:'' }}">
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ student.phone|default:'' }}">
        </div>

        <div class="mb-3">
            <label>Course</label>
            <input type="text" name="course" class="form-control" value="{{ student.course|default:'' }}">
        </div>

        <div class="mb-3">
            <label>Date of Joining</label>
            <input type="date" name="date_of_joining" class="form-control" value="{{ student.date_of_joining|date:'Y-m-d' }}">
        </div>

        <button class="btn btn-success">Save</button>
        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
    </form>

</div>

</body>
</html>
